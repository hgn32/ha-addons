configuration:
  pg_host:
    name: PostgreSQL ホスト
    description: 外部 PostgreSQL サーバのホスト名。
  pg_port:
    name: PostgreSQL ポート
    description: PostgreSQL サーバのポート番号。
  pg_user:
    name: PostgreSQL ユーザ
    description: PostgreSQL 接続に使用するユーザ名。
  pg_password:
    name: PostgreSQL パスワード
    description: PostgreSQL 接続に使用するパスワード。
  pg_database:
    name: データベース名
    description: Guacamole が使用するデータベース名。
  backup_enabled:
    name: バックアップを有効にする
    description: HA バックアップ前および起動時に pg_dump を実行して /config/backup/ に保存します。
  vacuum_logs_on_backup:
    name: バックアップ前に接続履歴を削除
    description: バックアップ前にデータベースの接続履歴テーブルを削除します。バックアップサイズが小さくなります。
  extensions:
    name: 拡張機能
    description: "有効にする Guacamole 拡張。例: auth-totp, auth-ldap, auth-quickconnect"
  ingress_auto_login:
    name: Ingress 自動ログイン
    description: HA ingress 経由アクセス時に Guacamole のログイン画面をバイパスします。
  ingress_auto_login_user:
    name: 自動ログインユーザ
    description: ingress 自動ログインで使用する Guacamole ユーザ名。
