# Home Assistant Ingress -> Guacamole(Tomcat ROOT, :8080)
#
# Guacamole の Web UI は <base href> を持たず全 URL が相対パス＋location.pathname
# ベースで構成されるため、ingress のサブパス配下でもそのまま動作する
# （sub_filter による base href 書き換えは不要）。
server {
    listen 8099 default_server;

    include /etc/nginx/includes/server_params.conf;

    location / {
        # Home Assistant ingress からのアクセスのみ許可
        allow 172.30.32.2;
        deny  all;

        # proxy_set_header はレベル単位で継承されるため、全 proxy_set_header を
        # location 内に集約する（proxy_params + 自動ログイン用ヘッダ）。
        include /etc/nginx/includes/proxy_params.conf;
        # X-WEBAUTH-USER の付与/クリアは ha-run.sh が起動時に生成する。
        # クライアントが送ってきた値は必ずこの値で上書きされる（なりすまし防止）。
        include /etc/nginx/includes/auth_header.conf;

        proxy_pass http://127.0.0.1:8080;
    }
}
