configuration:
  suwayomi_url:
    name: Suwayomi サーバー URL
    description: Suwayomi Server の URL。
  suwayomi_username:
    name: ユーザ名
    description: Suwayomi Server の認証ユーザ名（未設定の場合は空白）。
  suwayomi_password:
    name: パスワード
    description: Suwayomi Server の認証パスワード（未設定の場合は空白）。
  max_memory_mb:
    name: 最大メモリ使用量 (MB)
    description: Suwayomi Server（JVM）の最大ヒープサイズ（-Xmx）。
