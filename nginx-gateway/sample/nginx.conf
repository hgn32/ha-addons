load_module /usr/lib/nginx/modules/ngx_stream_module.so;
load_module /usr/lib/nginx/modules/ngx_http_geoip2_module.so;
load_module /usr/lib/nginx/modules/ngx_stream_geoip2_module.so;
load_module /usr/lib/nginx/modules/ngx_stream_js_module.so;

events {}

http {
    # --- GeoIP2
    geoip2 /share/nginx/GeoLite2-Country.mmdb {
        $geoip2_country_code source=$remote_addr country iso_code;
    }
    # --- ローカルネットワーク判定
    map $remote_addr $is_local {
        default 0;
        ~^192\.168\.1\.   1; # LAN
        ~^192\.168\.2\.   1; # WireGuard
        ~^172\.(1[6-9]|2[0-9]|3[0-1])\. 1; # Docker
        ~^127\.           1; # loopback
    }
    # --- 国内判定
    map $geoip2_country_code $is_jp {
        default 0;
        "JP" 1;
    }
    # --- 特例UA / path
    map $http_user_agent $ua_label {
        default "";
        "~^OpenAuth$"                                                   "openauth";
        "~^Mozilla/[0-9]+(?:\\.[0-9]+)? \\(compatible; Google-Cloud-Functions/[0-9]+(?:\\.[0-9]+)?; \\+http://www\\.google\\.com/bot\\.html\\)$" "gcf";
        "~^Mozilla/[0-9]+(?:\\.[0-9]+)? \\(compatible; Discordbot/[0-9]+(?:\\.[0-9]+)?; \\+https://discordapp\\.com\\)$" "discord";
    }
    map "$request_method $uri" $req_label {
        default "";
        "POST /auth/token"           "auth_token";
        "POST /api/google_assistant" "google_assistant";
        "~GET /local/.*"             "local";
    }
    map "$ua_label:$req_label" $allowed_pair {
        default 0;
        "openauth:auth_token"    1;
        "gcf:google_assistant"   1;
        "discord:local"          1;
    }

    # --- reject 判定（海外 & 許可外UAのみブロック）
    map "$is_local:$is_jp:$allowed_pair" $is_reject {
        default 0;
        "0:0:0" 1; # 海外 & 不許可UA → reject
    }

    # ログ
    log_format rejectlog '$time_local [REJECT] $remote_addr(cn:$geoip2_country_code) "$http_user_agent" - "$request"';
    error_log  /proc/self/fd/2 warn;

    # WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # SSL
    ssl_certificate     /ssl/fullchain.pem;
    ssl_certificate_key /ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4";
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;

    client_max_body_size 0;
    proxy_buffering      off;
    http2                on;

    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    proxy_http_version          1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    include /share/nginx/http/*.conf;
}

stream {
    # --- GeoIP2
    geoip2 /share/nginx/GeoLite2-Country.mmdb {
        $geoip2_country_code source=$remote_addr country iso_code;
    }
    map $remote_addr $is_local {
        default 0;
        ~^192\.168\.1\.   1; # LAN
        ~^192\.168\.2\.   1; # WireGuard
        ~^172\.(1[6-9]|2[0-9]|3[0-1])\. 1; # Docker
        ~^127\.           1; # loopback
    }
    map $geoip2_country_code $is_jp {
        default 0;
        "JP" 1;
    }
    js_import reject from /share/nginx/stream/reject.js;
    include /share/nginx/stream/*.conf;
}
