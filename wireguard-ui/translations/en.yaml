configuration:
  single_user_mode:
    name: Single User Mode
    description: If enabled, skips the login screen and grants direct access.
  default_interface_addresses:
    name: VPN Interface Addresses
    description: CIDR addresses assigned to the WireGuard interface (e.g. 192.168.101.0/24).
  subnet_ranges:
    name: Subnet Ranges
    description: "Named subnet ranges for client grouping. Format: \"name: CIDR\""
  dmz_subnet:
    name: DMZ Subnets
    description: Subnets to place in the DMZ (isolated from other VPN clients).
  dmz_subnet_allow:
    name: DMZ Allow Rules
    description: "Traffic rules allowed from DMZ. Format: \"ip_or_keyword|port/proto\""
  default_client_dns:
    name: Default Client DNS
    description: Default DNS server assigned to new VPN clients.
  default_client_endpoint:
    name: Default Client Endpoint
    description: Default server endpoint (host:port) assigned to new VPN clients.
  log_level:
    name: Log Level
    description: Logging verbosity level.
