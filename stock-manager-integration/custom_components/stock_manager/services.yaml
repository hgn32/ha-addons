use:
  name: 在庫消費
  description: 指定した品目の在庫を消費する
  fields:
    product_id:
      name: 品目ID
      description: sensor.product_<product_id> の product_id 属性
      required: true
      selector:
        text:
    quantity:
      name: 数量
      description: 消費する数量（デフォルト1）
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 9999
          mode: box

add:
  name: 在庫追加
  description: 指定した品目の在庫を追加する
  fields:
    product_id:
      name: 品目ID
      description: sensor.product_<product_id> の product_id 属性
      required: true
      selector:
        text:
    quantity:
      name: 数量
      description: 追加する数量（デフォルト1）
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 9999
          mode: box
