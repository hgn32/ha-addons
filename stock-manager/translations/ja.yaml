configuration:
  amazon_cron:
    name: Amazon 取込スケジュール
    description: Amazon 購入履歴の自動取込スケジュール（cron 形式・UTC）。
  notify_enabled:
    name: 通知を有効にする
    description: Amazon 取込完了時に Home Assistant へ通知を送るかどうか。
  force_schema_push:
    name: スキーマ強制反映
    description: 起動時にデータベースのスキーマ変更を強制的に適用する。通常は無効のままにしてください。
