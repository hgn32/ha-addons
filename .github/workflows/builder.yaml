name: Builder

env:
  MONITORED_FILES: "config.json Dockerfile"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app:
        description: "Rebuild a specific app (empty = all apps)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  init:
    name: Initialize builds
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      changed_apps: ${{ steps.filter.outputs.changed_apps }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed_files
        if: github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v47

      - name: Find app directories
        id: apps
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Filter changed apps
        id: filter
        env:
          APPS: ${{ steps.apps.outputs.addons }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
          REQUESTED_APP: ${{ inputs.app }}
        run: |
          changed_apps=()
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${REQUESTED_APP}" ]]; then
              for app in ${APPS}; do
                if [[ "${app}" == "${REQUESTED_APP}" ]]; then
                  changed_apps=("${app}")
                  break
                fi
              done
              if [[ ${#changed_apps[@]} -eq 0 ]]; then
                echo "::error::Unknown app '${REQUESTED_APP}'. Available: ${APPS}"
                exit 1
              fi
            else
              changed_apps=(${APPS})
            fi
          elif [[ "${CHANGED_FILES}" =~ \.github/workflows/(builder|build-app)\.yaml ]]; then
            changed_apps=(${APPS})
          else
            for app in ${APPS}; do
              for file in ${MONITORED_FILES}; do
                if [[ "${CHANGED_FILES}" =~ ${app}/${file} ]]; then
                  changed_apps+=("${app}")
                  break
                fi
              done
            done
          fi
          if [[ ${#changed_apps[@]} -gt 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_apps=$(jq -nc '$ARGS.positional' --args "${changed_apps[@]}")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-app:
    name: Build ${{ matrix.app }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.init.outputs.changed_apps) }}
    uses: ./.github/workflows/build-app.yaml
    with:
      app: ${{ matrix.app }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    secrets: inherit
