configuration:
  max_memory_mb:
    name: 最大メモリ使用量 (MB)
    description: VOICEVOX Engine プロセスの仮想メモリ上限(ulimit -v)。0 で制限なし(推奨)。エンジンは起動に仮想メモリ約8.1GBを要するため、設定する場合は 12288 以上を推奨。下回るとエンジンが起動できません。
  load_all_models:
    name: 全モデルを事前読み込み
    description: 起動時に全モデルを読み込みます(従来動作)。無効にすると必要時に読み込むため起動が数秒で完了します。起動問題の切り分けにも使えます。
  preload_speaker_ids:
    name: 事前読み込みするスタイルID
    description: 起動後に読み込むスタイルIDのリスト。「全モデルを事前読み込み」を無効にして併用すると、使うモデルだけ読み込みメモリを大幅節約できます(未指定のスタイルも初回利用時に自動読み込み)。
  cpu_num_threads:
    name: CPUスレッド数
    description: 合成に使うCPUスレッド数。0 でホストの物理コア数に自動設定(推奨)。SMT/HTの論理コアまで使うと逆に遅くなるため物理コア数を採用します。手動指定する場合は物理コア数以下にしてください。
