configuration:
  max_memory_mb:
    name: Max Memory (MB)
    description: Virtual memory limit (ulimit -v) for the VOICEVOX Engine process. 0 disables the limit (recommended). Small values prevent the engine from starting; check the startup log for measured RSS/VSZ.
  load_all_models:
    name: Preload all models
    description: Load all voice models at startup (previous behavior). Disable to load on demand so the engine starts listening within seconds; useful for troubleshooting startup issues.
